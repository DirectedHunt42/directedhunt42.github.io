<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nova Foundry Thanks</title>
<link rel="icon" type="image/x-icon" href="Images/Nova_foundry_favicon.ico" />
<link rel="stylesheet" href="style.css" />
<style>
body { margin:0; font-family: Arial, sans-serif; color: #fff; background: #000; overflow-x: hidden; }
.container { display: flex; flex-direction: row; padding: 20px; z-index: 10; position: relative; justify-content: center; }
.right-panel { flex: 1; display: flex; flex-direction: column; gap: 10px; max-width: 600px; align-items: center; }
.logo-small { max-width: 100%; height: auto; margin-bottom: 20px; }
.thanks-section { margin-bottom: 30px; display: flex; flex-direction: column; align-items: center; text-align: center; }
.thanks-section h2 { margin-bottom: 12px; font-size: 2em; }
.thanks-card { background: rgba(255,255,255,0.08); border-radius: 12px; padding: 20px; width: 100%; max-width: 500px; }
.thanks-card p { margin: 0 0 12px; }
.thanks-card a { display: inline-flex; }
.thanks-card img { width: 200px; height: auto; }
.thanks-note { margin-top: 10px; font-size: 0.95em; opacity: 0.9; }
canvas { position: fixed; top:0; left:0; z-index:0; }

@media (max-width: 768px) {
    .container { flex-direction: column; }
    .left-panel { margin-bottom: 20px; width: 100%; }
    .right-panel { width: 100%; flex: none; }
    html, body { overflow-x: hidden; }
}
</style>
</head>
<body>
<canvas id="starCanvas"></canvas>
<div class="container">
    <div class="right-panel">
        <a href="https://novafoundry.ca">
            <img class="logo-small" src="Images/Nova_foundry_wide_transparent_SVG.svg" alt="Nova Foundry Logo" />
        </a>
        <div class="thanks-section">
            <h2>Thanks</h2>
            <div class="thanks-card">
                <p>Special thanks to <strong>Quantum Glitch Software</strong> for the website idea.</p>
                <a href="https://qgsoftware.github.io/">
                    <img src="Images/QuantumGlitch.dib" alt="Quantum Glitch Software Logo">
                </a>
                <p class="thanks-note"><em>And thanks to my girlfriend Lucy for keeping me going, I couldn't do it without you. ❤️</em></p>
            </div>
        </div>
    </div>
</div>
<script src="starfield.js"></script>
</body>
</html>
