<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>404 - Nova Foundry</title>
<link rel="icon" type="image/x-icon" href="https://novafoundry.ca/favicon.ico" />
<link rel="stylesheet" href="style.css" />
</head>

<body>

<!-- SINGLE CENTERED PANEL (exactly the same card style as index.html projects) -->
<div class="notfound-container">
    <div class="right-panel">
        <div class="project-links-section">
            <h2>404 — PAGE NOT FOUND</h2>
            
            <div class="project-link-card">
                <div class="project-link-content error-content">
                    <p class="error-message">
                        404 — page <span id="requested-page"></span> does not exist
                    </p>
                    <a href="/" class="home-link">RETURN HOME</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Dynamic page name (exactly like before)
    document.addEventListener('DOMContentLoaded', () => {
        const currentPath = window.location.pathname;
        const requestedPage = currentPath.replace(/\/$/, '') || '/';
        const pageName = requestedPage.split('/').pop() || 'this page';
        
        const pageEl = document.getElementById('requested-page');
        if (pageEl) pageEl.textContent = pageName;
    });
</script>

</body>
</html>
